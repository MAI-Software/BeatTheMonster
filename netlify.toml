[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so deep links return index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# camera + cross-origin isolation headers (MediaPipe wasm)
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(self)"
